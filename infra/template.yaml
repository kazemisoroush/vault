AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Vault - Personal data vault API

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: provided.al2023
    Architectures:
      - x86_64

Parameters:
  GoogleClientID:
    Type: String
    NoEcho: true
  GoogleClientSecret:
    Type: String
    NoEcho: true
  GoogleRefreshToken:
    Type: String
    NoEcho: true
  OwnerEmail:
    Type: String
    Description: Google account email allowed to access the vault.
  WebOrigin:
    Type: String
    Default: "*"
    Description: Allowed CORS origin for the web app.

Resources:
  VaultHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        Authorizers:
          GoogleJwt:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: https://accounts.google.com
              audience:
                - !Ref GoogleClientID
        DefaultAuthorizer: GoogleJwt
      CorsConfiguration:
        AllowOrigins:
          - !Ref WebOrigin
        AllowHeaders:
          - Authorization
          - Content-Type
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  VaultFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: bootstrap
      CodeUri: ../api/
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref VaultTable
          GOOGLE_CLIENT_ID: !Ref GoogleClientID
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
          GOOGLE_REFRESH_TOKEN: !Ref GoogleRefreshToken
          OWNER_EMAIL: !Ref OwnerEmail
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VaultTable
      Events:
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref VaultHttpApi
            Path: /{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: makefile

  VaultTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: vault-files
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub "https://${VaultHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
