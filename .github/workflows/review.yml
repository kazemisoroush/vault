name: Review

# Reviews a pull request against CLAUDE.md and ends with a verdict. An approval
# is submitted as the Claude app, which satisfies a required approving review on
# main, so a single engineer can land a change on their own.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  # The action trades this for the Claude app token it reviews with.
  id-token: write

jobs:
  review:
    # A draft is not asking for a verdict yet.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: anthropics/claude-code-action@v1
        with:
          # A subscription token rather than an API key, so the review does not
          # need an API credit balance. Renew it with `claude setup-token`.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # No github_token on purpose. The repo token would make the review
          # github-actions[bot]; reviewing as the Claude app keeps the approval
          # attributable and dodges the rule that Actions may not approve a PR.
          #
          # The cost is that the app token is only issued when this file matches
          # the copy on main, so a pull request that edits this workflow gets no
          # review. The verdict step below turns that into a red check and a
          # comment rather than silence.
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} of
            ${{ github.repository }}.

            Read CLAUDE.md first. It is the rulebook and the review bar, and it
            is the only standard you judge against. Read the diff with
            `gh pr diff`, and read the surrounding files when you need context.
            Never guess.

            End with exactly one verdict, and nothing else:

            - No blocker:
              `gh pr review ${{ github.event.pull_request.number }} --approve --body "<body>"`.
            - One or more blockers:
              `gh pr review ${{ github.event.pull_request.number }} --request-changes --body "<body>"`.

            The body follows the Review comments section of CLAUDE.md, which
            gives the heading, the badges, the finding shape, and the sign-off.
            Link every file against the head commit
            ${{ github.event.pull_request.head.sha }}.

            Submitting the review is the last thing you do, and the run is a
            failure without it.
          claude_args: |
            --model claude-opus-4-8
            --allowedTools "Read,Grep,Glob,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr review:*)"

      # A failed job is a red check with no words in it. Say what happened on the
      # pull request itself, so nobody reads a missing approval as a verdict.
      - if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "**🤖 Claude review: could not run**

          The review job failed before it reached a verdict, so this pull request has no automated approval and nothing here says the diff is good.

          **Where.** ${RUN_URL}
          **Next.** Fix the cause and re-run the job, or review and approve by hand.

          <sub>Posted by Claude from the review workflow.</sub>"

      # A green check with no review reads exactly like an approval that never
      # came, so treat a missing verdict as a failure and say so.
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # --jq runs per page, so the counts are summed rather than read as one.
          verdicts=$(gh api --paginate "repos/${{ github.repository }}/pulls/${PR}/reviews" \
            --jq "[.[] | select(.commit_id == \"${SHA}\" and (.state == \"APPROVED\" or .state == \"CHANGES_REQUESTED\"))] | length" \
            | awk '{ total += $1 } END { print total + 0 }')
          if [ "${verdicts}" -gt 0 ]; then
            echo "Verdict submitted for ${SHA}."
            exit 0
          fi
          gh pr comment "${PR}" --body "**🤖 Claude review: no verdict**

          The review ran to completion but submitted no review, so this pull request has no automated approval.

          **Where.** ${RUN_URL}
          **Next.** Re-run the job, or review and approve by hand.

          <sub>Posted by Claude from the review workflow.</sub>"
          exit 1
