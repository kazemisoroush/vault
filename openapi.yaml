openapi: 3.0.3
info:
  title: Vault API
  description: >
    Personal data vault. Five file verbs: drop, get, list, update, delete,
    plus a health check for liveness.
    This contract is the source of truth. Backend implements it, frontend consumes it,
    and no client talks to storage directly. File bytes move through presigned S3 URLs
    so the API never carries file content.
  version: 0.1.0
security:
  - bearerAuth: []
paths:
  /files:
    post:
      operationId: dropFile
      summary: Register a file and get a presigned upload URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFileRequest'
      responses:
        '201':
          description: File record created. PUT the bytes to uploadUrl.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      operationId: listFiles
      summary: List file records.
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: One page of file records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFilesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /files/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getFile
      summary: Get one file record and a presigned download URL.
      responses:
        '200':
          description: File record with download URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFileResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateFile
      summary: Update the name or the free-form metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFileRequest'
      responses:
        '200':
          description: Updated file record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteFile
      summary: Delete the file bytes and the record.
      responses:
        '204':
          description: Deleted.
        '404':
          $ref: '#/components/responses/NotFound'
  /ask:
    post:
      operationId: ask
      summary: Find files matching a natural-language query.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskRequest'
      responses:
        '200':
          description: Matching files, most relevant first, each with a download URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AskResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /fill:
    post:
      operationId: fill
      summary: Answer a list of form fields from the owner's vault, each with its source file.
      description: >
        Fills a form from records instead of by hand. Each field is answered against the owner's
        files, concurrently, and the answers come back in request order. A field the vault cannot
        back with a document is returned found=false with an empty value, so a value never lands on
        a form without a source to review.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FillRequest'
      responses:
        '200':
          description: One answer per field, in request order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FillResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /checks:
    post:
      operationId: createCheck
      summary: Verify pasted text against the owner's stored documents.
      description: >
        Splits the text into atomic claims, matches each claim to a supporting span in the
        owner's files, and verifies every verbatim span in code, character for character,
        against the file's stored text. The pipeline runs asynchronously; poll the check by id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckRequest'
      responses:
        '202':
          description: Check accepted and queued. Poll GET /checks/{id} for verdicts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Check'
        '400':
          $ref: '#/components/responses/BadRequest'
  /checks/{id}:
    get:
      operationId: getCheck
      summary: Get one check with its claims and verdicts.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: The check, with claims once the pipeline has run.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Check'
        '404':
          $ref: '#/components/responses/NotFound'
  /calls:
    get:
      operationId: listCalls
      summary: List recent LLM calls, the trace of what the model did.
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 50 }
      responses:
        '200':
          description: Recent LLM calls, newest first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /metrics/time-to-file:
    post:
      operationId: reportTimeToFile
      summary: Report the client-measured time from asking to opening a file.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimeToFileRequest'
      responses:
        '204':
          description: Metric recorded.
        '400':
          $ref: '#/components/responses/BadRequest'
  /health:
    get:
      operationId: health
      summary: Liveness check.
      security: []
      responses:
        '200':
          description: Service is up.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Cognito access token. Obtain it by authenticating to the Vault user pool,
        then send it as Authorization: Bearer <token>. Every route except /health
        requires it.
  schemas:
    File:
      type: object
      required: [id, name, contentType, size, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        contentType: { type: string }
        size: { type: integer, format: int64 }
        status:
          type: string
          enum: [pending, landed, ingested, failed]
          description: >
            Ingestion lifecycle. A dropped file is pending while it is staged,
            landed once it is stored and queued for the Knowledge Base, ingested
            once the Knowledge Base has indexed it and it is searchable, or
            failed on a terminal error.
        meta:
          type: object
          additionalProperties: { type: string }
          description: Free-form key-value metadata. No fixed keys, no enums.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateFileRequest:
      type: object
      required: [name, contentType]
      properties:
        name: { type: string }
        contentType: { type: string }
        size: { type: integer, format: int64 }
        meta:
          type: object
          additionalProperties: { type: string }
    CreateFileResponse:
      type: object
      required: [file, uploadUrl]
      properties:
        file: { $ref: '#/components/schemas/File' }
        uploadUrl: { type: string }
    GetFileResponse:
      type: object
      required: [file, downloadUrl]
      properties:
        file: { $ref: '#/components/schemas/File' }
        downloadUrl: { type: string }
    ListFilesResponse:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items: { $ref: '#/components/schemas/File' }
        cursor: { type: string }
    UpdateFileRequest:
      type: object
      properties:
        name: { type: string }
        meta:
          type: object
          additionalProperties: { type: string }
    AskRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
    TimeToFileRequest:
      type: object
      required: [ms]
      properties:
        ms: { type: number, minimum: 0, maximum: 600000 }
    AskResult:
      type: object
      required: [file, downloadUrl]
      properties:
        file: { $ref: '#/components/schemas/File' }
        downloadUrl: { type: string }
    FillRequest:
      type: object
      required: [fields]
      properties:
        fields:
          type: array
          description: The form's fields, as free-text names such as "passport number".
          items: { type: string }
    FillSource:
      type: object
      required: [file, downloadUrl]
      properties:
        file: { $ref: '#/components/schemas/File' }
        downloadUrl: { type: string }
    FillAnswer:
      type: object
      required: [field, value, found, sources]
      properties:
        field: { type: string }
        value:
          type: string
          description: The answer, empty when found is false.
        found:
          type: boolean
          description: True only when a document backs the value. False means the vault had no sourced answer.
        error:
          type: boolean
          description: True when the lookup itself failed. This is not a genuine miss, so the caller retries rather than treating the value as absent.
        sources:
          type: array
          items: { $ref: '#/components/schemas/FillSource' }
    FillResponse:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items: { $ref: '#/components/schemas/FillAnswer' }
    AskResponse:
      type: object
      required: [results]
      properties:
        answer:
          type: string
          description: A short human-readable answer drawn from the matched files, empty when there is none.
        results:
          type: array
          items: { $ref: '#/components/schemas/AskResult' }
    LlmCall:
      type: object
      required: [op, model, latencyMs, inputTokens, outputTokens, ok, createdAt]
      properties:
        op: { type: string }
        model: { type: string }
        prompt: { type: string }
        reply: { type: string }
        inputTokens: { type: integer, format: int64 }
        outputTokens: { type: integer, format: int64 }
        latencyMs: { type: integer, format: int64 }
        ok: { type: boolean }
        error: { type: string }
        createdAt: { type: string, format: date-time }
    CallsResponse:
      type: object
      required: [calls]
      properties:
        calls:
          type: array
          items: { $ref: '#/components/schemas/LlmCall' }
    CreateCheckRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          maxLength: 20000
          description: The text to verify, roughly a pasted page or two.
    Reference:
      type: object
      required: [fileId, fileName, spanText, start, end, relation]
      description: >
        One passage in one of the owner's files that bears on a claim. Every reference passed
        the existence gate: code re-read the stored text at the offsets and matched spanText
        character for character before it was persisted.
      properties:
        fileId: { type: string }
        fileName: { type: string }
        spanText:
          type: string
          description: The passage, exactly as it appears in the file's stored text.
        start:
          type: integer
          description: >
            UTF-8 byte offset of the span in the file's stored text, located by code. Byte, not
            character: a JavaScript client must slice encoded bytes (TextEncoder), or locate
            spanText directly, rather than indexing the string by these numbers.
        end:
          type: integer
        relation:
          type: string
          enum: [verbatim, paraphrase, contradicts]
          description: >
            How the passage bears on the claim, as judged by the model. Verbatim additionally
            survived a code-level claim-span comparison; a missing contradicts reference never
            certifies that no contradiction exists.
    Claim:
      type: object
      required: [text, start, end, verdict]
      properties:
        text: { type: string }
        start:
          type: integer
          description: >
            UTF-8 byte offset of the claim in the check's own text. Byte, not character; see
            Reference.start for how a JavaScript client should use it.
        end:
          type: integer
        verdict:
          type: string
          enum: [verified, disputed, review, unsupported]
          description: >
            Verified means a reference restates the claim and code confirmed it character for
            character. Disputed outranks verified: the record holds contradicting evidence, and
            both sides are in references. Review means reworded support awaits a human.
            Unsupported means no supporting span was confirmed, whether the search came back
            empty or the model's proposals were discarded by the gate; silence, not falsehood.
        references:
          type: array
          items: { $ref: '#/components/schemas/Reference' }
    Check:
      type: object
      required: [id, text, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        text: { type: string }
        status:
          type: string
          enum: [pending, running, done, failed]
        claims:
          type: array
          items: { $ref: '#/components/schemas/Claim' }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
  responses:
    BadRequest:
      description: The request is invalid.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: The file does not exist.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
