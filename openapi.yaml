openapi: 3.0.3
info:
  title: Vault API
  description: >
    Personal data vault. Five verbs only: drop, get, list, update, delete.
    This contract is the source of truth. Backend implements it, frontend consumes it,
    and no client talks to storage directly. File bytes move through presigned S3 URLs
    so the API never carries file content.
  version: 0.1.0
paths:
  /files:
    post:
      operationId: dropFile
      summary: Register a file and get a presigned upload URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFileRequest'
      responses:
        '201':
          description: File record created. PUT the bytes to uploadUrl.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      operationId: listFiles
      summary: List file records, newest first.
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: One page of file records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFilesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /files/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getFile
      summary: Get one file record and a presigned download URL.
      responses:
        '200':
          description: File record with download URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFileResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateFile
      summary: Update the name or the free-form metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFileRequest'
      responses:
        '200':
          description: Updated file record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteFile
      summary: Delete the file bytes and the record.
      responses:
        '204':
          description: Deleted.
        '404':
          $ref: '#/components/responses/NotFound'
  /health:
    get:
      operationId: health
      summary: Liveness check.
      responses:
        '200':
          description: Service is up.
components:
  schemas:
    File:
      type: object
      required: [id, name, contentType, size, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        contentType: { type: string }
        size: { type: integer, format: int64 }
        meta:
          type: object
          additionalProperties: { type: string }
          description: Free-form key-value metadata. No fixed keys, no enums.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateFileRequest:
      type: object
      required: [name, contentType]
      properties:
        name: { type: string }
        contentType: { type: string }
        size: { type: integer, format: int64 }
        meta:
          type: object
          additionalProperties: { type: string }
    CreateFileResponse:
      type: object
      required: [file, uploadUrl]
      properties:
        file: { $ref: '#/components/schemas/File' }
        uploadUrl: { type: string }
    GetFileResponse:
      type: object
      required: [file, downloadUrl]
      properties:
        file: { $ref: '#/components/schemas/File' }
        downloadUrl: { type: string }
    ListFilesResponse:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items: { $ref: '#/components/schemas/File' }
        cursor: { type: string }
    UpdateFileRequest:
      type: object
      properties:
        name: { type: string }
        meta:
          type: object
          additionalProperties: { type: string }
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
  responses:
    BadRequest:
      description: The request is invalid.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: The file does not exist.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
