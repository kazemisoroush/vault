openapi: 3.0.3
info:
  title: Vault API
  description: >
    Personal data vault. Five file verbs: drop, get, list, update, delete,
    plus a health check for liveness.
    This contract is the source of truth. Backend implements it, frontend consumes it,
    and no client talks to storage directly. File bytes move through presigned S3 URLs
    so the API never carries file content.
  version: 0.1.0
security:
  - bearerAuth: []
paths:
  /files:
    post:
      operationId: dropFile
      summary: Register a file and get a presigned upload URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFileRequest'
      responses:
        '201':
          description: File record created. PUT the bytes to uploadUrl.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      operationId: listFiles
      summary: List file records.
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: One page of file records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFilesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /files/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getFile
      summary: Get one file record and a presigned download URL.
      responses:
        '200':
          description: File record with download URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFileResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateFile
      summary: Update the name or the free-form metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFileRequest'
      responses:
        '200':
          description: Updated file record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteFile
      summary: Delete the file bytes and the record.
      responses:
        '204':
          description: Deleted.
        '404':
          $ref: '#/components/responses/NotFound'
  /ask:
    post:
      operationId: ask
      summary: Find files matching a natural-language query.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskRequest'
      responses:
        '200':
          description: Matching files, most relevant first, each with a download URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AskResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /calls:
    get:
      operationId: listCalls
      summary: List recent LLM calls, the trace of what the model did.
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 50 }
      responses:
        '200':
          description: Recent LLM calls, newest first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /health:
    get:
      operationId: health
      summary: Liveness check.
      security: []
      responses:
        '200':
          description: Service is up.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Cognito access token. Obtain it by authenticating to the Vault user pool,
        then send it as Authorization: Bearer <token>. Every route except /health
        requires it.
  schemas:
    File:
      type: object
      required: [id, name, contentType, size, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        contentType: { type: string }
        size: { type: integer, format: int64 }
        status:
          type: string
          enum: [pending, ready, failed]
          description: >
            Extraction lifecycle. A dropped file is pending until the extractor
            fills its metadata, then ready, or failed if the extractor errored.
        meta:
          type: object
          additionalProperties: { type: string }
          description: Free-form key-value metadata. No fixed keys, no enums.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateFileRequest:
      type: object
      required: [name, contentType, hash]
      properties:
        name: { type: string }
        contentType: { type: string }
        size: { type: integer, format: int64 }
        hash:
          type: string
          description: The content hash (SHA-256 hex) that identifies the file; the same bytes always hash the same.
        meta:
          type: object
          additionalProperties: { type: string }
    CreateFileResponse:
      type: object
      required: [file]
      properties:
        file: { $ref: '#/components/schemas/File' }
        uploadUrl:
          type: string
          description: Presigned PUT for the bytes; absent when the file already exists (a duplicate drop).
    GetFileResponse:
      type: object
      required: [file, downloadUrl]
      properties:
        file: { $ref: '#/components/schemas/File' }
        downloadUrl: { type: string }
    ListFilesResponse:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items: { $ref: '#/components/schemas/File' }
        cursor: { type: string }
    UpdateFileRequest:
      type: object
      properties:
        name: { type: string }
        meta:
          type: object
          additionalProperties: { type: string }
    AskRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
    AskResult:
      type: object
      required: [file, downloadUrl]
      properties:
        file: { $ref: '#/components/schemas/File' }
        downloadUrl: { type: string }
    AskResponse:
      type: object
      required: [results]
      properties:
        answer:
          type: string
          description: A short human-readable answer drawn from the matched files, empty when there is none.
        results:
          type: array
          items: { $ref: '#/components/schemas/AskResult' }
    LlmCall:
      type: object
      required: [op, model, latencyMs, inputTokens, outputTokens, ok, createdAt]
      properties:
        op: { type: string }
        model: { type: string }
        prompt: { type: string }
        reply: { type: string }
        inputTokens: { type: integer, format: int64 }
        outputTokens: { type: integer, format: int64 }
        latencyMs: { type: integer, format: int64 }
        ok: { type: boolean }
        error: { type: string }
        createdAt: { type: string, format: date-time }
    CallsResponse:
      type: object
      required: [calls]
      properties:
        calls:
          type: array
          items: { $ref: '#/components/schemas/LlmCall' }
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
  responses:
    BadRequest:
      description: The request is invalid.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: The file does not exist.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
